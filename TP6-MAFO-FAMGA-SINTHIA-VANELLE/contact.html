<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact - Mon mini-site
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="page">
        <header>
        <h1>Page de contact
        </h1>
        </header>
        <nav>
            <a href="index.html">Accueil
        </a>
        <a href="presentation.html">Présentation
        </a>
        <a href="contact.html">Contact
        </a>
        </nav>
        <h2>Formulaire de contact
        </h2>
        <p>Veuillez remplir ce formulaire pour envoyer un message
        </p>
        <form>
            <label for="nom">Nom
            </label>
            <input type="text" id="nom" name="nom" placeholder="Entrez votre nom" required>
            <br>
            <br>
            <label for="prenom">Prenom
            </label>
            <input type="text" id="prenom" name="prenom" placeholder="Entrez votre prenom" required>
            <br>
            <br>
            <label for="email">Adresse email
            </label>
            <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
            <br>
            <br>
            <label for="telephone">Téléphone
            </label>
            <input type="tel" id="telephone" name="telephone" placeholder="+237 6 XX XX XX XX">
            <br>
            <br>
            <label for="motif">Motif du message 
            </label>
            <select id="motif" name="motif" required>
                <option value="">Choisir un motif
                </option>
                <option value="information">Demande d'information
                </option>
                <option value="stage">Demande de stage
                </option>
                <option value="projet">Proposition de projet
                </option>
                <option value="autre">Autre demande
                </option>
                <br>
                <br>
            </select>
            <br>
            <br>
                <label for="domaine">Domaine d'intéret
                </label>
                <select id="domaine" name="domaine" required>
                <option value="">Choisir un domaine
                </option>
                <option value="réseaux">Réseaux informatique
                </option>
                <option value="cybersecurite">Cybersecurite
                </option>
                <option value="administration-systeme">Administration-systeme
                </option>
                <option value="developpement web">Developpement web
                </option>
                </select>
            <br>
            <br>
            <p>Statut du visiteur
            </p>
            <input type="radio" id="etudiant" name="statut" value="etudiant" required>
            <label for="etudiant">Etudiant 
            </label>
            <br>
            <input type="radio" id="enseignant" name="statut" value="enseignant">
            <label for="enseignant">Enseignant
            </label>
            <br>
            <input type="radio" id="professionnel" name="statut" value="professionnel">
            <label for="professionnel">Prefessionnel 
            </label>
            <br>
            <br>
            <label for="message">Message
            </label>
            <br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="ecrivez votre message ici" required>
            </textarea>
            <br>
            <br>
            <input type="checkbox" id="confirmation" name="confirmation" required>
            <label for="confirmation">Je confirme que les informations saisies sont correctes
            </label>
            <br>
            <br>
            <button type="submit">Envoyer
            </button>
            <button type="reset">Effacer
            </button>
        </form>
    </body>
</html>
