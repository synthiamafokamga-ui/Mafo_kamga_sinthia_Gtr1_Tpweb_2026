<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conta+ct-mon mini-site</title>
</head>
<body>    
    <h1> page de contact</h1>
    <nav>
        <a href="index.html">accueil</a>
        <a href="presentation.html">presentation</a>
        <a href="contact.html">contact</a>
        </nav>
        <h2> formulaire de contactr</h2>
        </p>veuiller remplir ce formulaire pour envoyer un message.</p>
        <form > 
            <label for="nom">nom</label>
            <input type="text" name="nom" id="nom"placeholder="entrer votre nom"><br><br>
            <label for="prenom">prenom</label>
            <input type="text"id="prenom"name="prenom"placeholder="entrer votre prenom">
            <br><br>
             <label for="email">"adresse email":</label>
             <label for="telephone">telephone:</label>
             <input type="tel"id="telephone"name="telephone"placeholder="+237 656 62 12 52">
             <br><br>
             <input type="email"id="emailt"name="email" placeholder="exemple@email.com"><br><br>
             <label for="motif">motif du message:</label>
             <select  id="motif"name="motif"required>
             <option value="">choisir un motif</option>
             <option value="information">demande d'information</option>
             <option value="stage">demande de stage</option>
             <option value="projet">proposition de projet</option>
             <option value="autre">autre demande</option>
        </select ><br><br>
             <label for="message">message:</label><br><br>
             <textarea  id="message"name="message"rows="5"cols="40"placeholder="ecrivez votre message ici"required></textarea>
             <br><br>
             <input type="checkbox"id="confirmation"name="confirmation"required>
             <label for="confirmation">je confirme que les information saisies sont correcte.</label>
             <br><br>
             <label for="domaine">domaine d'interet:</label>
             <select id="domaine"name="domaine"requied></select>
             <option value=""></option>
             <option value="reseaux">reseaux informatiques</option>
             <option value="cybersecurite">cybersecurité</option>
             <option value="developpement-web">developpement web</option>
             <option value="administration-systeme">administration systeme</option>
             </select>
             <button type="submit">envoyer</button>
             <button type="reset">effacer</button>
             <p>statut du visiteur</p>
             <input type="radio"id="etudiant"name="statut"value="etudiant"required>
             <label for="etudiant">étudiant</label>
             <br>
             <input type="radio"id="enseignant"name="statut"value="enseignant">
             <label for="enseignant">enseignant</label>
             <br>
             <input type="radio"id="proffessionnel"name="statut"value="professionnel">
             <label for="professionnel">professionnel</label>
             <br><br>
        </form>
</body>
</html>
